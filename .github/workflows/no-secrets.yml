# Blocks common credential files and runs TruffleHog on pushes and PRs.
name: Secret protection

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  block-tracked-env:
    name: No tracked .env secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if .env (except .env.example) is in git
        shell: bash
        run: |
          set -euo pipefail
          # Any path ending in .env or named .env.something (except .env.example)
          while IFS= read -r f; do
            case "$f" in
              .env.example) ;;
              *) echo "::error::Do not commit secret env files. Remove from git: $f"; exit 1 ;;
            esac
          done < <(git ls-files | grep -E '(^|/)\.env(\.|$)' || true)

  trufflehog:
    name: TruffleHog scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.88.4
        with:
          extra_args: --only-verified
